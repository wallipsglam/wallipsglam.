<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=device-width, initial-scale=1.0">
    <title>Shop All - Wallips Glam</title>
    <style>
        :root {
            --primary-color: #ff8da1;
            --secondary-color: #fff0f2;
            --text-color: #333;
            --dark-pink: #d05a70;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fcf8f9;
            color: var(--text-color);
        }

        /* En-tête */
        header {
            background-color: #ffffff;
            border-bottom: 1px solid #f0d0d6;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container img {
            height: 50px;
            object-fit: contain;
        }

        .cart-icon-container {
            position: relative;
            cursor: pointer;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: var(--dark-pink);
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
        }

        /* Bannière d'accueil */
        .hero {
            background-color: var(--secondary-color);
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 30px;
        }

        .hero h1 {
            color: var(--dark-pink);
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Grille des Produits */
        .products-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 50px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #f7e1e4;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image-wrapper {
            width: 100%;
            height: 320px;
            background-color: #f9f9f9;
            overflow: hidden;
        }

        .product-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            text-align: center;
        }

        .product-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #222;
        }

        .product-price {
            font-size: 1.15rem;
            color: var(--dark-pink);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .add-to-cart-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            margin-top: auto;
            width: 100%;
        }

        .add-to-cart-btn:hover {
            background-color: var(--dark-pink);
        }

        /* Pied de page */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: auto;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Barre de Navigation -->
    <header>
        <div class="logo-container">
            <!-- Utilise votre logo importé -->
            <img src="logo Wallipsglam.png" alt="Wallips Glam Logo">
        </div>
        <div class="cart-icon-container">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#d05a70" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span class="cart-count" id="cart-count">0</span>
        </div>
    </header>

    <!-- Bannière -->
    <section class="hero">
        <h1>Wallips Glam</h1>
        <p>Brillez au quotidien avec notre collection de gloss ultra brillants et fruités.</p>
    </section>

    <!-- Grille des Produits -->
    <main class="products-grid">

        <!-- Produit 1 : Shine -->
        <div class="product-card">
            <div class="product-image-wrapper">
                <img src="shine.jpg" alt="Gloss Shine">
            </div>
            <div class="product-info">
                <h3 class="product-title">Shine</h3>
                <p class="product-price">7 000 FCFA</p>
                <button class="add-to-cart-btn" onclick="addToCart('Shine')">Ajouter au panier</button>
            </div>
        </div>

        <!-- Produit 2 : Sky Drip -->
        <div class="product-card">
            <div class="product-image-wrapper">
                <img src="sky_drip.jpg" alt="Gloss Sky Drip">
            </div>
            <div class="product-info">
                <h3 class="product-title">Sky Drip</h3>
                <p class="product-price">7 000 FCFA</p>
                <button class="add-to-cart-btn" onclick="addToCart('Sky Drip')">Ajouter au panier</button>
            </div>
        </div>

        <!-- Produit 3 : Green Goddess -->
        <div class="product-card">
            <div class="product-image-wrapper">
                <img src="green_goddess.jpg" alt="Gloss Green Goddess">
            </div>
            <div class="product-info">
                <h3 class="product-title">Green Goddess</h3>
                <p class="product-price">7 000 FCFA</p>
                <button class="add-to-cart-btn" onclick="addToCart('Green Goddess')">Ajouter au panier</button>
            </div>
        </div>

    </main>

    <!-- Pied de page -->
    <footer>
        <p>&copy; 2026 Wallips Glam. Tous droits réservés.</p>
    </footer>

    <!-- Script du Panier -->
    <script>
        let cartItemsCount = 0;

        function addToCart(productName) {
            cartItemsCount++;
            document.getElementById('cart-count').innerText = cartItemsCount;
            alert(productName + " a été ajouté avec succès à votre panier ! 💖");
        }
    </script>

</body>
</html>
